comment">#服务器 ImageNet所在位置</span></span><br><span class="line"><span class="comment">#IMAGENET_PATH = "/data2/ranyu/ImageNet_val"</span></span><br><span class="line"><span class="keyword">if</span> IMAGENET_PATH == <span class="string">""</span>:</span><br><span class="line">    <span class="keyword">raise</span> ValueError(<span class="string">"Please fill out the path to ImageNet"</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#ch.set_default_tensor_type('torch.cuda.FloatTensor')</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">norm</span><span class="params">(t)</span>:</span></span><br><span class="line">    <span class="keyword">assert</span> len(t.shape) == <span class="number">4</span></span><br><span class="line">    norm_vec = ch.sqrt(t.pow(<span class="number">2</span>).sum(dim=[<span class="number">1</span>,<span class="number">2</span>,<span class="number">3</span>])).view(<span class="number">-1</span>, <span class="number">1</span>, <span class="number">1</span>, <span class="number">1</span>)</span><br><span class="line">    norm_vec += (norm_vec == <span class="number">0</span>).float()*<span class="number">1e-8</span></span><br><span class="line">    <span class="keyword">return</span> norm_vec</span><br><span class="line"></span><br><span class="line"><span class="comment">###</span></span><br><span class="line"><span class="comment"># Different optimization steps</span></span><br><span class="line"><span class="comment"># All take the form of func(x, g, lr)</span></span><br><span class="line"><span class="comment"># eg: exponentiated gradients</span></span><br><span class="line"><span class="comment"># l2/linf: projected gradient descent</span></span><br><span class="line"><span class="comment">###</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">eg_step</span><span class="params">(x, g, lr)</span>:</span></span><br><span class="line">    real_x = (x + <span class="number">1</span>)/<span class="number">2</span> <span class="comment"># from [-1, 1] to [0, 1]</span></span><br><span class="line">    pos = real_x*ch.exp(lr*g)</span><br><span class="line">    neg = (<span class="number">1</span>-real_x)*ch.exp(-lr*g)</span><br><span class="line">    new_x = pos/(pos+neg)</span><br><span class="line">    <span class="keyword">return</span> new_x*<span class="number">2</span><span class="number">-1</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">linf_step</span><span class="params">(x, g, lr)</span>:</span></span><br><span class="line">    <span class="keyword">return</span> x + lr*ch.sign(g)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">l2_prior_step</span><span class="params">(x, g, lr)</span>:</span></span><br><span class="line">    new_x = x + lr*g/norm(g)</span><br><span class="line">    norm_new_x = norm(new_x)</span><br><span class="line">    norm_mask = (norm_new_x &lt; <span class="number">1.0</span>).float()</span><br><span class="line">    <span class="keyword">return</span> new_x*norm_mask + (<span class="number">1</span>-norm_mask)*new_x/norm_new_x</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">gd_prior_step</span><span class="params">(x, g, lr)</span>:</span></span><br><span class="line">    <span class="keyword">return</span> x + lr*g</span><br><span class="line">   </span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">l2_image_step</span><span class="params">(x, g, lr)</span>:</span></span><br><span class="line">    <span class="keyword">return</span> x + lr*g/norm(g)</span><br><span class="line"></span><br><span class="line"><span class="comment">##</span></span><br><span class="line"><span class="comment"># Projection steps for l2 and linf constraints:</span></span><br><span class="line"><span class="comment"># All take the form of func(new_x, old_x, epsilon)</span></span><br><span class="line"><span class="comment">##</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">l2_proj</span><span class="params">(image, eps)</span>:</span></span><br><span class="line">    orig = image.clone()</span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">proj</span><span class="params">(new_x)</span>:</span></span><br><span class="line">        delta = new_x - orig</span><br><span class="line">        out_of_bounds_mask = (norm(delta) &gt; eps).float()</span><br><span class="line">        x = (orig + eps*delta/norm(delta))*out_of_bounds_mask</span><br><span class="line">        x += new_x*(<span class="number">1</span>-out_of_bounds_mask)</span><br><span class="line">        <span class="keyword">return</span> x</span><br><span class="line">    <span class="keyword">return</span> proj</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">linf_proj</span><span class="params">(image, eps)</span>:</span></span><br><span class="line">    orig = image.clone()</span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">proj</span><span class="params">(new_x)</span>:</span></span><br><span class="line">        <span class="keyword">return</span> orig + ch.clamp(new_x - orig, -eps, eps)</span><br><span class="line">    <span class="keyword">return</span> proj</span><br><span class="line"></span><br><span class="line"><span class="comment">##</span></span><br><span class="line"><span class="comment"># Main functions</span></span><br><span class="line"><span class="comment">##</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">make_adversarial_examples</span><span class="params">(image, true_label, args, model_to_fool, IMAGENET_SL)</span>:</span></span><br><span class="line">    <span class="string">'''</span></span><br><span class="line"><span class="string">    The main process for generating adversarial examples with priors.</span></span><br><span class="line"><span class="string">    '''</span></span><br><span class="line">    <span class="comment"># Initial setup</span></span><br><span class="line">    prior_size = IMAGENET_SL <span class="keyword">if</span> <span class="keyword">not</span> args.tiling <span class="keyword">else</span> args.tile_size</span><br><span class="line">    upsampler = Upsample(size=(IMAGENET_SL, IMAGENET_SL))</span><br><span class="line">    total_queries = ch.zeros(args.batch_size)</span><br><span class="line">    prior = ch.zeros(args.batch_size, <span class="number">3</span>, prior_size, prior_size)</span><br><span class="line">    dim=prior.nelement()/args.batch_size</span><br><span class="line">    prior_step = gd_prior_step <span class="keyword">if</span> args.mode == <span class="string">'l2'</span> <span class="keyword">else</span> eg_step</span><br><span class="line">    image_step = l2_image_step <span class="keyword">if</span> args.mode == <span class="string">'l2'</span> <span class="keyword">else</span> linf_step</span><br><span class="line">    proj_maker = l2_proj <span class="keyword">if</span> args.mode == <span class="string">'l2'</span> <span class="keyword">else</span> linf_proj</span><br><span class="line">    proj_step = proj_maker(image, args.epsilon)</span><br><span class="line">    print(image.max(), image.min())</span><br><span class="line">    <span class="comment">#print(image)</span></span><br><span class="line">    <span class="comment"># Loss function</span></span><br><span class="line">    criterion = ch.nn.CrossEntropyLoss(reduction=<span class="string">'none'</span>)</span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">normalized_eval</span><span class="params">(x)</span>:</span></span><br><span class="line">        x_copy = x.clone()</span><br><span class="line">        x_copy = ch.stack([F.normalize(x_copy[i], [<span class="number">0.485</span>, <span class="number">0.456</span>, <span class="number">0.406</span>], [<span class="number">0.229</span>, <span class="number">0.224</span>, <span class="number">0.225</span>]) \</span><br><span class="line">                        <span class="keyword">for</span> i <span class="keyword">in</span> range(args.batch_size)])</span><br><span class="line">        <span class="keyword">return</span> model_to_fool(x_copy)</span><br><span class="line"></span><br><span class="line">    L = <span class="keyword">lambda</span> x: criterion(normalized_eval(x), true_label)</span><br><span class="line">    losses = L(image)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># Original classifications</span></span><br><span class="line">    orig_images = image.clone()</span><br><span class="line">    orig_classes = model_to_fool(image).argmax(<span class="number">1</span>)</span><br><span class="line">    correct_classified_mask = (orig_classes == true_label).float()          <span class="comment">#分类器分对</span></span><br><span class="line">    total_ims = correct_classified_mask.sum()</span><br><span class="line">    not_dones_mask = correct_classified_mask.clone()</span><br><span class="line"></span><br><span class="line">    t = <span class="number">0</span></span><br><span class="line">    <span class="keyword">while</span> <span class="keyword">not</span> ch.any(total_queries &gt; args.max_queries):</span><br><span class="line">        t += args.gradient_iters*<span class="number">2</span></span><br><span class="line">        <span class="keyword">if</span> t &gt;= args.max_queries:</span><br><span class="line">            <span class="keyword">break</span></span><br><span class="line">        <span class="keyword">if</span> <span class="keyword">not</span> args.nes:</span><br><span class="line">            <span class="comment">## Updating the prior:</span></span><br><span class="line">            <span class="comment"># Create noise for exporation, esti88mate the gradient, and take a PGD step</span></span><br><span class="line">            exp_noise = args.exploration*ch.randn_like(prior)/(dim**<span class="number">0.5</span>)</span><br><span class="line">            <span class="comment"># Query deltas for finite difference estimator</span></span><br><span class="line">            q1 = upsampler(prior + exp_noise)                   <span class="comment">#关键就是这个prior vt隐向量，这个prior也会更新，把梯度累加上去</span></span><br><span class="line">            q2 = upsampler(prior - exp_noise)                   <span class="comment"># prior 相当于累积的更新量，用这个更新量，再去修改image，就会变得非常准</span></span><br><span class="line">            <span class="comment"># Loss points for finite difference estimator       #查询</span></span><br><span class="line">            l1 = L(image + args.fd_eta*q1/norm(q1)) <span class="comment"># L(prior + c*noise)        # q1/norm(q1)) 单位方向向量</span></span><br><span class="line">            l2 = L(image + args.fd_eta*q2/norm(q2)) <span class="comment"># L(prior - c*noise)</span></span><br><span class="line">            <span class="comment"># Finite differences estimate of directional derivative        方向导数的有限差分估计</span></span><br><span class="line">            est_deriv = (l1 - l2)/(args.fd_eta*args.exploration)       <span class="comment"># 方向导数 , l1和l2是loss</span></span><br><span class="line">            <span class="comment"># 2-query gradient estimate                         #估计的梯度</span></span><br><span class="line">            est_grad = est_deriv.view(<span class="number">-1</span>, <span class="number">1</span>, <span class="number">1</span>, <span class="number">1</span>)*exp_noise    <span class="comment"># 注意，修正的是prior,这就是bandit算法的精髓</span></span><br><span class="line">            <span class="comment"># Update the prior with the estimated gradient</span></span><br><span class="line">            prior = prior_step(prior, est_grad, args.online_lr)</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            prior = ch.zeros_like(image)</span><br><span class="line">            <span class="keyword">for</span> _ <span class="keyword">in</span> range(args.gradient_iters):</span><br><span class="line">                exp_noise = ch.randn_like(image)/(dim**<span class="number">0.5</span>)</span><br><span class="line">                est_deriv = (L(image + args.fd_eta*exp_noise) - L(image - args.fd_eta*exp_noise))/args.fd_eta</span><br><span class="line">                prior += est_deriv.view(<span class="number">-1</span>, <span class="number">1</span>, <span class="number">1</span>, <span class="number">1</span>)*exp_noise</span><br><span class="line"></span><br><span class="line">            <span class="comment"># Preserve images that are already done, </span></span><br><span class="line">            <span class="comment"># Unless we are specifically measuring gradient estimation</span></span><br><span class="line">            prior = prior*not_dones_mask.view(<span class="number">-1</span>, <span class="number">1</span>, <span class="number">1</span>, <span class="number">1</span>)</span><br><span class="line"></span><br><span class="line">        <span class="comment">## Update the image:</span></span><br><span class="line">        <span class="comment"># take a pgd step using the prior</span></span><br><span class="line">        new_im = image_step(image, upsampler(prior*correct_classified_mask.view(<span class="number">-1</span>, <span class="number">1</span>, <span class="number">1</span>, <span class="number">1</span>)), args.image_lr)</span><br><span class="line">        image = proj_step(new_im)</span><br><span class="line">        image = ch.clamp(image, <span class="number">0</span>, <span class="number">1</span>)</span><br><span class="line">        <span class="keyword">if</span> args.mode == <span class="string">'l2'</span>:</span><br><span class="line">            <span class="keyword">if</span> <span class="keyword">not</span> ch.all(norm(image - orig_images) &lt;= args.epsilon + <span class="number">1e-3</span>):</span><br><span class="line">                pdb.set_trace()</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            <span class="keyword">if</span> <span class="keyword">not</span> (image - orig_images).max() &lt;= args.epsilon + <span class="number">1e-3</span>:</span><br><span class="line">                pdb.set_trace()</span><br><span class="line"></span><br><span class="line">        <span class="comment">## Continue query count</span></span><br><span class="line">        total_queries += <span class="number">2</span>*args.gradient_iters*not_dones_mask</span><br><span class="line">        not_dones_mask = not_dones_mask*((normalized_eval(image).argmax(<span class="number">1</span>) == true_label).float())</span><br><span class="line"></span><br><span class="line">        <span class="comment">## Logging stuff</span></span><br><span class="line">        new_losses = L(image)</span><br><span class="line">        success_mask = (<span class="number">1</span> - not_dones_mask)*correct_classified_mask</span><br><span class="line">        num_success = success_mask.sum()</span><br><span class="line">        current_success_rate = (num_success/correct_classified_mask.sum()).cpu().item()</span><br><span class="line">        success_queries = ((success_mask*total_queries).sum()/num_success).cpu().item()</span><br><span class="line">        not_done_loss = ((new_losses*not_dones_mask).sum()/not_dones_mask.sum()).cpu().item()</span><br><span class="line">        max_curr_queries = total_queries.max().cpu().item()</span><br><span class="line">        <span class="keyword">if</span> args.log_progress:</span><br><span class="line">            print(<span class="string">"Queries: %d | Success rate: %f | Average queries: %f"</span> % (max_curr_queries, current_success_rate, success_queries))</span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> current_success_rate == <span class="number">1.0</span>:</span><br><span class="line">            <span class="keyword">break</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> &#123;</span><br><span class="line">            <span class="string">'average_queries'</span>: success_queries,</span><br><span class="line">            <span class="string">'num_correctly_classified'</span>: correct_classified_mask.sum().cpu().item(),</span><br><span class="line">            <span class="string">'success_rate'</span>: current_success_rate,</span><br><span class="line">            <span class="string">'images_orig'</span>: orig_images.cpu().numpy(),</span><br><span class="line">            <span class="string">'images_adv'</span>: image.cpu().numpy(),</span><br><span class="line">            <span class="string">'all_queries'</span>: total_queries.cpu().numpy(),</span><br><span class="line">            <span class="string">'correctly_classified'</span>: correct_classified_mask.cpu().numpy(),</span><br><span class="line">            <span class="string">'success'</span>: success_mask.cpu().numpy()</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">main</span><span class="params">(args, model_to_fool, dataset_size)</span>:</span></span><br><span class="line">    dataset = ImageFolder(IMAGENET_PATH,</span><br><span class="line">                    transforms.Compose([</span><br><span class="line">                        transforms.Resize(dataset_size),</span><br><span class="line">                        transforms.CenterCrop(dataset_size),</span><br><span class="line">                        transforms.ToTensor(),</span><br><span class="line">                    ]))</span><br><span class="line">    dataset_loader = DataLoader(dataset, batch_size=args.batch_size)</span><br><span class="line">    total_correct, total_adv, total_queries = <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span></span><br><span class="line">    <span class="keyword">for</span> i, (images, targets) <span class="keyword">in</span> enumerate(dataset_loader):</span><br><span class="line">        print(<span class="string">"images:&#123;&#125;"</span>.format(i))</span><br><span class="line">        <span class="keyword">if</span> i*args.batch_size &gt;= args.total_images:</span><br><span class="line">            <span class="keyword">break</span></span><br><span class="line">        res = make_adversarial_examples(images, targets, args, model_to_fool, dataset_size)</span><br><span class="line">        ncc = res[<span class="string">'num_correctly_classified'</span>] <span class="comment"># Number of correctly classified images (originally)</span></span><br><span class="line">        num_adv = ncc * res[<span class="string">'success_rate'</span>] <span class="comment"># Success rate was calculated as (# adv)/(# correct classified)</span></span><br><span class="line">        queries = num_adv * res[<span class="string">'average_queries'</span>] <span class="comment"># Average queries was calculated as (total queries for advs)/(# advs)</span></span><br><span class="line">        total_correct += ncc</span><br><span class="line">        total_adv += num_adv</span><br><span class="line">        total_queries += queries</span><br><span class="line"></span><br><span class="line">    print(<span class="string">"-"</span>*<span class="number">80</span>)</span><br><span class="line">    print(<span class="string">"Final Success Rate: &#123;succ&#125; | Final Average Queries: &#123;aq&#125;"</span>.format(</span><br><span class="line">            aq=total_queries/total_adv,</span><br><span class="line">            succ=total_adv/total_correct))</span><br><span class="line">    print(<span class="string">"-"</span>*<span class="number">80</span>)</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Parameters</span><span class="params">()</span>:</span></span><br><span class="line">    <span class="string">'''</span></span><br><span class="line"><span class="string">    Parameters class, just a nice way of accessing a dictionary</span></span><br><span class="line"><span class="string">    &gt; ps = Parameters(&#123;"a": 1, "b": 3&#125;)</span></span><br><span class="line"><span class="string">    &gt; ps.A # returns 1</span></span><br><span class="line"><span class="string">    &gt; ps.B # returns 3</span></span><br><span class="line"><span class="string">    '''</span></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__init__</span><span class="params">(self, params)</span>:</span></span><br><span class="line">        self.params = params</span><br><span class="line">    </span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__getattr__</span><span class="params">(self, x)</span>:</span></span><br><span class="line">        <span class="keyword">return</span> self.params[x.lower()]</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">"__main__"</span>:</span><br><span class="line">    parser = argparse.ArgumentParser()</span><br><span class="line">    parser.add_argument(<span class="string">'--max-queries'</span>, type=int)</span><br><span class="line">    parser.add_argument(<span class="string">'--fd-eta'</span>, type=float, help=<span class="string">'\eta, used to estimate the derivative via finite differences'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--image-lr'</span>, type=float, help=<span class="string">'Learning rate for the image (iterative attack)'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--online-lr'</span>, type=float, help=<span class="string">'Learning rate for the prior'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--mode'</span>, type=str, help=<span class="string">'Which lp constraint to run bandits [linf|l2]'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--exploration'</span>, type=float, help=<span class="string">'\delta, parameterizes the exploration to be done around the prior'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--tile-size'</span>, type=int, help=<span class="string">'the side length of each tile (for the tiling prior)'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--json-config'</span>, type=str, help=<span class="string">'a config file to be passed in instead of arguments'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--epsilon'</span>, type=float, help=<span class="string">'the lp perturbation bound'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--batch-size'</span>, type=int, help=<span class="string">'batch size for bandits'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--log-progress'</span>, action=<span class="string">'store_true'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--nes'</span>, action=<span class="string">'store_true'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--tiling'</span>, action=<span class="string">'store_true'</span>)</span><br><span class="line">    parser.add_argument(<span class="string">'--gradient-iters'</span>, type=int)</span><br><span class="line">    parser.add_argument(<span class="string">'--total-images'</span>, type=int)</span><br><span class="line">    parser.add_argument(<span class="string">'--classifier'</span>, type=str, default=<span class="string">'inception_v3'</span>, choices=CLASSIFIERS.keys())</span><br><span class="line">    args = parser.parse_args()</span><br><span class="line"></span><br><span class="line">    args_dict = <span class="literal">None</span></span><br><span class="line">    <span class="keyword">if</span> <span class="keyword">not</span> args.json_config:</span><br><span class="line">        <span class="comment"># If there is no json file, all of the args must be given</span></span><br><span class="line">        args_dict = vars(args)</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        <span class="comment"># If a json file is given, use the JSON file as the base, and then update it with args</span></span><br><span class="line">        defaults = json.load(open(args.json_config))</span><br><span class="line">        arg_vars = vars(args)</span><br><span class="line">        arg_vars = &#123;k: arg_vars[k] <span class="keyword">for</span> k <span class="keyword">in</span> arg_vars <span class="keyword">if</span> arg_vars[k] <span class="keyword">is</span> <span class="keyword">not</span> <span class="literal">None</span>&#125;</span><br><span class="line">        defaults.update(arg_vars)</span><br><span class="line">        args = Parameters(defaults)</span><br><span class="line">        args_dict = defaults</span><br><span class="line">    </span><br><span class="line">    model_type = CLASSIFIERS[args.classifier][<span class="number">0</span>]</span><br><span class="line">    model_to_fool = model_type(pretrained=<span class="literal">True</span>)</span><br><span class="line">    <span class="comment"># model_to_fool = DataParallel(model_to_fool)</span></span><br><span class="line">    model_to_fool.eval()            <span class="comment">#模型</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">with</span> ch.no_grad():</span><br><span class="line">        main(args, model_to_fool, CLASSIFIERS[args.classifier][<span class="number">1</span>])</span><br></pre></td></tr></table></figure>
